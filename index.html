<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="A browser view for the Android FOSS catalog.">
	<meta name="theme-color" content="#222222">
	<title>Android FOSS</title>
	<link id="theme-css" rel="stylesheet" href="vendor/bootswatch/darkly/bootstrap.min.css">
	<link rel="icon" href="android.svg" type="image/svg+xml">
	<style>
		body
		{
			min-height: 100vh;
		}
		main
		{
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
			font-size: 16px;
			line-height: 1.5;
			max-width: 960px;
			width: 100%;
			margin: auto;
			padding: 1rem;
		}
		.theme-control
		{
			position: fixed;
			right: 1rem;
			bottom: 1rem;
			z-index: 10;
			display: flex;
			align-items: center;
			gap: .5rem;
			padding: .5rem;
			background: rgba(0, 0, 0, .75);
			border: 1px solid rgba(255, 255, 255, .2);
			border-radius: .5rem;
		}
		.catalog-filters
		{
			max-width: 960px;
			margin: 1rem auto 0;
			padding: .75rem 1rem;
			border-bottom: 1px solid rgba(255, 255, 255, .16);
		}
		.filter-grid
		{
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: .75rem;
		}
		.filter-field
		{
			display: flex;
			flex-direction: column;
			gap: .25rem;
			min-width: 0;
		}
		.filter-field label
		{
			font-size: .78rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0;
		}
		.filter-field input,
		.filter-field select
		{
			width: 100%;
		}
		#filter-summary
		{
			margin-top: .75rem;
			font-size: .9rem;
		}
		#status
		{
			max-width: 960px;
			margin: 1rem auto;
			padding: .75rem 1rem;
			border: 1px solid transparent;
			border-radius: .5rem;
		}
		#status[hidden]
		{
			display: none;
		}
		#status.error
		{
			border-color: #f5c2c7;
			background: #842029;
			color: #fff;
		}
		.trust-metadata
		{
			display: flex;
			flex-wrap: wrap;
			gap: .25rem;
			margin: .25rem 0 .5rem;
			font-size: .78rem;
		}
		.trust-badge
		{
			display: inline-flex;
			align-items: center;
			gap: .25rem;
			padding: .1rem .4rem;
			border: 1px solid rgba(255, 255, 255, .2);
			border-radius: 999px;
			background: rgba(255, 255, 255, .08);
			line-height: 1.4;
		}
		.trust-badge.warning
		{
			border-color: #ffc107;
			color: #ffc107;
		}
		.trust-badge.good
		{
			border-color: #75b798;
			color: #75b798;
		}
		@media (max-width: 700px)
		{
			.filter-grid
			{
				grid-template-columns: 1fr;
			}
			.theme-control
			{
				position: static;
				justify-content: flex-end;
				margin: .5rem;
			}
		}
	</style>
</head>
<body>

	<div class="theme-control">
		<label for="theme-select">Theme</label>
		<select id="theme-select">
			<option value="darkly">Darkly</option>
			<option value="united">United</option>
			<option value="flatly">Flatly</option>
			<option value="quartz">Quartz</option>
		</select>
	</div>

	<form class="catalog-filters" role="search" aria-label="Catalog filters">
		<div class="filter-grid">
			<div class="filter-field">
				<label for="filter-search">Search</label>
				<input id="filter-search" type="search" autocomplete="off" placeholder="App, category, package, source">
			</div>
			<div class="filter-field">
				<label for="filter-category">Category</label>
				<select id="filter-category">
					<option value="">All categories</option>
				</select>
			</div>
			<div class="filter-field">
				<label for="filter-store">Store</label>
				<select id="filter-store">
					<option value="">Any store</option>
					<option value="F-Droid">F-Droid</option>
					<option value="IzzyOnDroid">IzzyOnDroid</option>
					<option value="none">No store link</option>
				</select>
			</div>
			<div class="filter-field">
				<label for="filter-host">Source Host</label>
				<select id="filter-host">
					<option value="">Any host</option>
				</select>
			</div>
			<div class="filter-field">
				<label for="filter-trust">Trust Flag</label>
				<select id="filter-trust">
					<option value="">Any trust flag</option>
					<option value="anti-features">Has anti-features</option>
					<option value="sensitive-permissions">Sensitive permissions</option>
					<option value="no-anti-features">No anti-features</option>
					<option value="source-archive">Source archive</option>
					<option value="reproducible-verified">Reproducible verified</option>
				</select>
			</div>
			<div class="filter-field">
				<label for="filter-recency">Update Recency</label>
				<select id="filter-recency">
					<option value="">Any update age</option>
					<option value="90">Updated within 90 days</option>
					<option value="365">Updated within 1 year</option>
					<option value="730">Updated within 2 years</option>
					<option value="stale">Older than 2 years</option>
					<option value="unknown">No update metadata</option>
				</select>
			</div>
		</div>
		<div id="filter-summary" aria-live="polite">Filters load after the catalog renders.</div>
	</form>

	<div id="status" role="alert" hidden></div>
	<main aria-busy="true"></main>

	<script src="vendor/marked/marked.umd.js"></script>
	<script src="vendor/marked-gfm-heading-id/index.umd.js"></script>
	<script src="vendor/dompurify/purify.min.js"></script>

	<script>
		const defaultTheme = 'darkly';
		const sourceFile = new URLSearchParams( window.location.search ).get( 'source' ) || 'README.md';
		const allowedThemes = new Map( [
			[ 'darkly', 'vendor/bootswatch/darkly/bootstrap.min.css' ],
			[ 'united', 'vendor/bootswatch/united/bootstrap.min.css' ],
			[ 'flatly', 'vendor/bootswatch/flatly/bootstrap.min.css' ],
			[ 'quartz', 'vendor/bootswatch/quartz/bootstrap.min.css' ],
		] );

		const main = document.querySelector( 'main' );
		const status = document.querySelector( '#status' );
		const themeSelect = document.querySelector( '#theme-select' );
		const filterSearch = document.querySelector( '#filter-search' );
		const filterCategory = document.querySelector( '#filter-category' );
		const filterStore = document.querySelector( '#filter-store' );
		const filterHost = document.querySelector( '#filter-host' );
		const filterTrust = document.querySelector( '#filter-trust' );
		const filterRecency = document.querySelector( '#filter-recency' );
		const filterSummary = document.querySelector( '#filter-summary' );
		const filterControls = [ filterSearch, filterCategory, filterStore, filterHost, filterTrust, filterRecency ];
		let catalogItems = [];

		function showError( message )
		{
			status.textContent = message;
			status.className = 'error';
			status.hidden = false;
			main.setAttribute( 'aria-busy', 'false' );
		}

		function changeCSS( theme )
		{
			if ( !allowedThemes.has( theme ) ) return;
			document.querySelector( '#theme-css' ).href = allowedThemes.get( theme );
		}

		function dependenciesReady()
		{
			return window.marked && window.markedGfmHeadingId && window.DOMPurify;
		}

		function renderMarkdown( data )
		{
			const html = marked.parse( data );
			return DOMPurify.sanitize( html, { USE_PROFILES: { html: true } } );
		}

		async function loadTrustMetadata()
		{
			try
			{
				const response = await fetch( 'catalog-trust.json', { cache: 'no-store' } );
				if ( response.status === 404 ) return null;
				if ( !response.ok ) throw new Error( `HTTP ${response.status}` );
				return await response.json();
			}
			catch ( error )
			{
				console.warn( 'Trust metadata could not be loaded:', error );
				return null;
			}
		}

		function addBadge( container, text, className, title )
		{
			const badge = document.createElement( 'span' );
			badge.className = `trust-badge ${className || ''}`.trim();
			badge.textContent = text;
			if ( title ) badge.title = title;
			container.append( badge );
		}

		function addPackageBadges( container, metadata )
		{
			addBadge( container, metadata.store, 'good' );
			if ( metadata.antiFeatures && metadata.antiFeatures.length )
			{
				addBadge( container, `Anti-features: ${metadata.antiFeatures.join( ', ' )}`, 'warning' );
			}
			else
			{
				addBadge( container, 'No anti-features', 'good' );
			}

			if ( metadata.sensitivePermissions && metadata.sensitivePermissions.length )
			{
				addBadge(
					container,
					`Sensitive perms: ${metadata.sensitivePermissions.length}`,
					'warning',
					metadata.sensitivePermissions.join( '\n' )
				);
			}
			else if ( Number.isInteger( metadata.permissionCount ) )
			{
				addBadge( container, 'No sensitive perms', 'good' );
			}

			if ( metadata.lastUpdated )
			{
				addBadge( container, `Updated ${metadata.lastUpdated}` );
			}
			if ( metadata.reproducible === true )
			{
				addBadge( container, 'Reproducible verified', 'good' );
			}
			else if ( metadata.reproducible === false )
			{
				addBadge( container, 'Reproducible not verified', 'warning' );
			}
			else if ( metadata.store === 'F-Droid' )
			{
				addBadge( container, 'Reproducible unknown' );
			}
			if ( metadata.sourceArchive )
			{
				addBadge( container, 'Source archive', 'good' );
			}
		}

		function applyTrustMetadata( metadata )
		{
			if ( !metadata || !metadata.entries ) return;
			for ( const link of main.querySelectorAll( 'li > a:first-child' ) )
			{
				const name = link.textContent.trim();
				const entry = metadata.entries[ name ];
				if ( !entry || !Array.isArray( entry.packages ) || !entry.packages.length ) continue;

				const container = document.createElement( 'div' );
				container.className = 'trust-metadata';
				container.setAttribute( 'aria-label', `${name} trust metadata` );
				for ( const packageMetadata of entry.packages )
				{
					addPackageBadges( container, packageMetadata );
				}
				link.closest( 'li' ).append( container );
			}
		}

		function cleanHeading( text )
		{
			return text.replace( /^[\s\-–•]+|[\s\-–•]+$/g, '' ).trim();
		}

		function packageIds( entry )
		{
			if ( !entry || !Array.isArray( entry.packages ) ) return [];
			return entry.packages.map( item => item.packageId ).filter( Boolean );
		}

		function latestUpdate( entry )
		{
			if ( !entry || !Array.isArray( entry.packages ) ) return null;
			const dates = entry.packages
				.map( item => item.lastUpdated )
				.filter( Boolean )
				.sort();
			return dates.length ? dates.at( -1 ) : null;
		}

		function daysSince( dateText )
		{
			if ( !dateText ) return null;
			const date = new Date( `${dateText}T00:00:00Z` );
			if ( Number.isNaN( date.getTime() ) ) return null;
			return Math.floor( ( Date.now() - date.getTime() ) / 86400000 );
		}

		function hasTrustFlag( item, flag )
		{
			if ( !flag ) return true;
			const packages = item.metadata && Array.isArray( item.metadata.packages ) ? item.metadata.packages : [];
			if ( flag === 'anti-features' )
			{
				return packages.some( metadata => metadata.antiFeatures && metadata.antiFeatures.length );
			}
			if ( flag === 'sensitive-permissions' )
			{
				return packages.some( metadata => metadata.sensitivePermissions && metadata.sensitivePermissions.length );
			}
			if ( flag === 'no-anti-features' )
			{
				return packages.length > 0 && packages.every( metadata => !metadata.antiFeatures || !metadata.antiFeatures.length );
			}
			if ( flag === 'source-archive' )
			{
				return packages.some( metadata => metadata.sourceArchive );
			}
			if ( flag === 'reproducible-verified' )
			{
				return packages.some( metadata => metadata.reproducible === true );
			}
			return true;
		}

		function matchesRecency( item, recency )
		{
			if ( !recency ) return true;
			const age = daysSince( item.latestUpdate );
			if ( recency === 'unknown' ) return age === null;
			if ( recency === 'stale' ) return age !== null && age > 730;
			return age !== null && age <= Number( recency );
		}

		function matchesFilters( item )
		{
			const search = filterSearch.value.trim().toLowerCase();
			if ( search && !item.searchText.includes( search ) ) return false;
			if ( filterCategory.value && item.category !== filterCategory.value ) return false;
			if ( filterStore.value === 'none' && item.stores.length ) return false;
			if ( filterStore.value && filterStore.value !== 'none' && !item.stores.includes( filterStore.value ) ) return false;
			if ( filterHost.value && item.sourceHost !== filterHost.value ) return false;
			if ( !hasTrustFlag( item, filterTrust.value ) ) return false;
			if ( !matchesRecency( item, filterRecency.value ) ) return false;
			return true;
		}

		function applyFilters()
		{
			let visible = 0;
			for ( const item of catalogItems )
			{
				const matched = matchesFilters( item );
				item.element.hidden = !matched;
				if ( matched ) visible += 1;
			}
			filterSummary.textContent = `Showing ${visible} of ${catalogItems.length} entries.`;
		}

		function fillSelect( select, values )
		{
			for ( const value of values )
			{
				const option = document.createElement( 'option' );
				option.value = value;
				option.textContent = value;
				select.append( option );
			}
		}

		function buildCatalogIndex( metadata )
		{
			const entries = metadata && metadata.entries ? metadata.entries : {};
			const categories = new Set();
			const hosts = new Set();
			let category = '';
			catalogItems = [];

			for ( const element of main.querySelectorAll( 'h2, h3, li' ) )
			{
				if ( element.matches( 'h3' ) )
				{
					category = cleanHeading( element.textContent );
					if ( category ) categories.add( category );
					continue;
				}
				if ( !element.matches( 'li' ) ) continue;

				const sourceLink = element.querySelector( ':scope > a:first-child' );
				if ( !sourceLink || !sourceLink.href.startsWith( 'http' ) ) continue;

				const name = sourceLink.textContent.trim();
				const source = new URL( sourceLink.href );
				const stores = [ ...element.querySelectorAll( 'a[href*="f-droid.org/packages/"], a[href*="apt.izzysoft.de/packages/"]' ) ]
					.map( link => link.href.includes( 'apt.izzysoft.de' ) ? 'IzzyOnDroid' : 'F-Droid' );
				const entryMetadata = entries[ name ];
				const ids = packageIds( entryMetadata );
				const latest = latestUpdate( entryMetadata );
				const itemCategory = category || 'General';
				categories.add( itemCategory );
				hosts.add( source.hostname );
				catalogItems.push( {
					element,
					name,
					category: itemCategory,
					sourceHost: source.hostname,
					stores,
					metadata: entryMetadata,
					latestUpdate: latest,
					searchText: [ name, itemCategory, source.hostname, source.href, ...stores, ...ids ].join( ' ' ).toLowerCase(),
				} );
			}

			fillSelect( filterCategory, [ ...categories ].sort( ( a, b ) => a.localeCompare( b ) ) );
			fillSelect( filterHost, [ ...hosts ].sort( ( a, b ) => a.localeCompare( b ) ) );
			window.__androidFossCatalogItems = catalogItems;
			window.__androidFossApplyFilters = applyFilters;
			applyFilters();
		}

		async function loadCatalog()
		{
			if ( !dependenciesReady() )
			{
				showError( 'Catalog renderer failed to load local dependencies.' );
				return;
			}

			marked.use( markedGfmHeadingId.gfmHeadingId() );
			window.__androidFossRenderMarkdown = renderMarkdown;

			try
			{
				const response = await fetch( sourceFile, { cache: 'no-store' } );
				if ( !response.ok )
				{
					throw new Error( `HTTP ${response.status}` );
				}

				main.innerHTML = renderMarkdown( await response.text() );
				const trustMetadata = await loadTrustMetadata();
				applyTrustMetadata( trustMetadata );
				buildCatalogIndex( trustMetadata );
				main.setAttribute( 'aria-busy', 'false' );
			}
			catch ( error )
			{
				showError( `Catalog could not be loaded from ${sourceFile}.` );
				console.error( 'Catalog load failed:', error );
			}
		}

		themeSelect.value = defaultTheme;
		themeSelect.addEventListener( 'change', event => changeCSS( event.target.value ) );
		filterControls.forEach( control => control.addEventListener( 'input', applyFilters ) );
		loadCatalog();
	</script>
</body>
</html>
