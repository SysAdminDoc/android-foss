<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="A browser view for the Android FOSS catalog.">
	<meta name="theme-color" content="#222222">
	<title>Android FOSS</title>
	<link id="theme-css" rel="stylesheet" href="vendor/bootswatch/darkly/bootstrap.min.css">
	<link rel="icon" href="android.svg" type="image/svg+xml">
	<style>
		body
		{
			min-height: 100vh;
		}
		main
		{
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
			font-size: 16px;
			line-height: 1.5;
			max-width: 960px;
			width: 100%;
			margin: auto;
			padding: 1rem;
		}
		.theme-control
		{
			position: fixed;
			right: 1rem;
			bottom: 1rem;
			z-index: 10;
			display: flex;
			align-items: center;
			gap: .5rem;
			padding: .5rem;
			background: rgba(0, 0, 0, .75);
			border: 1px solid rgba(255, 255, 255, .2);
			border-radius: .5rem;
		}
		#status
		{
			max-width: 960px;
			margin: 1rem auto;
			padding: .75rem 1rem;
			border: 1px solid transparent;
			border-radius: .5rem;
		}
		#status[hidden]
		{
			display: none;
		}
		#status.error
		{
			border-color: #f5c2c7;
			background: #842029;
			color: #fff;
		}
		.trust-metadata
		{
			display: flex;
			flex-wrap: wrap;
			gap: .25rem;
			margin: .25rem 0 .5rem;
			font-size: .78rem;
		}
		.trust-badge
		{
			display: inline-flex;
			align-items: center;
			gap: .25rem;
			padding: .1rem .4rem;
			border: 1px solid rgba(255, 255, 255, .2);
			border-radius: 999px;
			background: rgba(255, 255, 255, .08);
			line-height: 1.4;
		}
		.trust-badge.warning
		{
			border-color: #ffc107;
			color: #ffc107;
		}
		.trust-badge.good
		{
			border-color: #75b798;
			color: #75b798;
		}
		@media (max-width: 700px)
		{
			.theme-control
			{
				position: static;
				justify-content: flex-end;
				margin: .5rem;
			}
		}
	</style>
</head>
<body>

	<div class="theme-control">
		<label for="theme-select">Theme</label>
		<select id="theme-select">
			<option value="darkly">Darkly</option>
			<option value="united">United</option>
			<option value="flatly">Flatly</option>
			<option value="quartz">Quartz</option>
		</select>
	</div>

	<div id="status" role="alert" hidden></div>
	<main aria-busy="true"></main>

	<script src="vendor/marked/marked.umd.js"></script>
	<script src="vendor/marked-gfm-heading-id/index.umd.js"></script>
	<script src="vendor/dompurify/purify.min.js"></script>

	<script>
		const defaultTheme = 'darkly';
		const sourceFile = new URLSearchParams( window.location.search ).get( 'source' ) || 'README.md';
		const allowedThemes = new Map( [
			[ 'darkly', 'vendor/bootswatch/darkly/bootstrap.min.css' ],
			[ 'united', 'vendor/bootswatch/united/bootstrap.min.css' ],
			[ 'flatly', 'vendor/bootswatch/flatly/bootstrap.min.css' ],
			[ 'quartz', 'vendor/bootswatch/quartz/bootstrap.min.css' ],
		] );

		const main = document.querySelector( 'main' );
		const status = document.querySelector( '#status' );
		const themeSelect = document.querySelector( '#theme-select' );

		function showError( message )
		{
			status.textContent = message;
			status.className = 'error';
			status.hidden = false;
			main.setAttribute( 'aria-busy', 'false' );
		}

		function changeCSS( theme )
		{
			if ( !allowedThemes.has( theme ) ) return;
			document.querySelector( '#theme-css' ).href = allowedThemes.get( theme );
		}

		function dependenciesReady()
		{
			return window.marked && window.markedGfmHeadingId && window.DOMPurify;
		}

		function renderMarkdown( data )
		{
			const html = marked.parse( data );
			return DOMPurify.sanitize( html, { USE_PROFILES: { html: true } } );
		}

		async function loadTrustMetadata()
		{
			try
			{
				const response = await fetch( 'catalog-trust.json', { cache: 'no-store' } );
				if ( response.status === 404 ) return null;
				if ( !response.ok ) throw new Error( `HTTP ${response.status}` );
				return await response.json();
			}
			catch ( error )
			{
				console.warn( 'Trust metadata could not be loaded:', error );
				return null;
			}
		}

		function addBadge( container, text, className, title )
		{
			const badge = document.createElement( 'span' );
			badge.className = `trust-badge ${className || ''}`.trim();
			badge.textContent = text;
			if ( title ) badge.title = title;
			container.append( badge );
		}

		function addPackageBadges( container, metadata )
		{
			addBadge( container, metadata.store, 'good' );
			if ( metadata.antiFeatures && metadata.antiFeatures.length )
			{
				addBadge( container, `Anti-features: ${metadata.antiFeatures.join( ', ' )}`, 'warning' );
			}
			else
			{
				addBadge( container, 'No anti-features', 'good' );
			}

			if ( metadata.sensitivePermissions && metadata.sensitivePermissions.length )
			{
				addBadge(
					container,
					`Sensitive perms: ${metadata.sensitivePermissions.length}`,
					'warning',
					metadata.sensitivePermissions.join( '\n' )
				);
			}
			else if ( Number.isInteger( metadata.permissionCount ) )
			{
				addBadge( container, 'No sensitive perms', 'good' );
			}

			if ( metadata.lastUpdated )
			{
				addBadge( container, `Updated ${metadata.lastUpdated}` );
			}
			if ( metadata.reproducible === true )
			{
				addBadge( container, 'Reproducible verified', 'good' );
			}
			else if ( metadata.reproducible === false )
			{
				addBadge( container, 'Reproducible not verified', 'warning' );
			}
			else if ( metadata.store === 'F-Droid' )
			{
				addBadge( container, 'Reproducible unknown' );
			}
			if ( metadata.sourceArchive )
			{
				addBadge( container, 'Source archive', 'good' );
			}
		}

		function applyTrustMetadata( metadata )
		{
			if ( !metadata || !metadata.entries ) return;
			for ( const link of main.querySelectorAll( 'li > a:first-child' ) )
			{
				const name = link.textContent.trim();
				const entry = metadata.entries[ name ];
				if ( !entry || !Array.isArray( entry.packages ) || !entry.packages.length ) continue;

				const container = document.createElement( 'div' );
				container.className = 'trust-metadata';
				container.setAttribute( 'aria-label', `${name} trust metadata` );
				for ( const packageMetadata of entry.packages )
				{
					addPackageBadges( container, packageMetadata );
				}
				link.closest( 'li' ).append( container );
			}
		}

		async function loadCatalog()
		{
			if ( !dependenciesReady() )
			{
				showError( 'Catalog renderer failed to load local dependencies.' );
				return;
			}

			marked.use( markedGfmHeadingId.gfmHeadingId() );
			window.__androidFossRenderMarkdown = renderMarkdown;

			try
			{
				const response = await fetch( sourceFile, { cache: 'no-store' } );
				if ( !response.ok )
				{
					throw new Error( `HTTP ${response.status}` );
				}

				main.innerHTML = renderMarkdown( await response.text() );
				applyTrustMetadata( await loadTrustMetadata() );
				main.setAttribute( 'aria-busy', 'false' );
			}
			catch ( error )
			{
				showError( `Catalog could not be loaded from ${sourceFile}.` );
				console.error( 'Catalog load failed:', error );
			}
		}

		themeSelect.value = defaultTheme;
		themeSelect.addEventListener( 'change', event => changeCSS( event.target.value ) );
		loadCatalog();
	</script>
</body>
</html>
